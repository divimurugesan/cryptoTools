<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Cryptanalysis Tool - Breaking Classical Ciphers</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h1 class="text-center mb-4">🤖 AI-Based Cryptanalysis Tool</h1>
        <p class="text-center text-muted">Breaking Classical Ciphers using Machine Learning</p>
        
        <div class="row">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">
                        <h5>Ciphertext Input</h5>
                    </div>
                    <div class="card-body">
                        <textarea id="ciphertext" class="form-control" rows="6" 
                                  placeholder="Enter ciphertext to analyze..."></textarea>
                        
                        <div class="mt-3">
                            <label>Cipher Type:</label>
                            <select id="cipher-type" class="form-select">
                                <option value="auto">Auto Detect</option>
                                <option value="Caesar">Caesar Cipher</option>
                                <option value="Vigenère">Vigenère Cipher</option>
                                <option value="Monoalphabetic">Monoalphabetic Substitution</option>
                                <option value="Playfair">Playfair Cipher</option>
                            </select>
                        </div>
                        
                        <div class="mt-3">
                            <button onclick="analyze()" class="btn btn-primary w-100">
                                🔍 Analyze & Break
                            </button>
                            <button onclick="compareMethods()" class="btn btn-secondary w-100 mt-2">
                                📊 Compare Methods
                            </button>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">
                        <h5>Results</h5>
                    </div>
                    <div class="card-body">
                        <div id="results" class="results-area">
                            <p class="text-muted">Analysis results will appear here...</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="row mt-4">
            <div class="col-md-12">
                <div class="card">
                    <div class="card-header">
                        <h5>Frequency Analysis</h5>
                    </div>
                    <div class="card-body">
                        <div id="frequency-chart" class="text-center">
                            <p class="text-muted">Frequency chart will appear after analysis...</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="row mt-4">
            <div class="col-md-12">
                <div class="card">
                    <div class="card-header">
                        <h5>Analysis Metrics</h5>
                    </div>
                    <div class="card-body">
                        <div id="metrics">
                            <div class="row">
                                <div class="col-md-4">
                                    <div class="metric-card">
                                        <h6>N-Gram Score</h6>
                                        <p id="ngram-score">-</p>
                                    </div>
                                </div>
                                <div class="col-md-4">
                                    <div class="metric-card">
                                        <h6>Dictionary Match Score</h6>
                                        <p id="dict-score">-</p>
                                    </div>
                                </div>
                                <div class="col-md-4">
                                    <div class="metric-card">
                                        <h6>Confidence Level</h6>
                                        <p id="confidence">-</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
